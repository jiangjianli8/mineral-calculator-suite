<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>矿链通 · 矿产品综合计价工具</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/calc-card.css">
</head>
<body>

<div class="app">
  <header class="app-header">
    <h1>矿链通 · 矿产品综合计价工具</h1>
    <div class="subtitle">MINERAL CALCULATOR SUITE</div>
  </header>

  <nav class="tab-nav" id="tabNav">
    <button data-target="spodumene" class="active">锂辉石</button>
    <button data-target="copper">铜</button>
    <button data-target="nickel">镍</button>
    <button data-target="tantalum">钽铌</button>
    <button data-target="tin">锡</button>
    <button data-target="znpb">铅锌</button>
  </nav>

  <section class="global-panel">
    <h3>⚙️ 全局参数</h3>
    <div class="global-fields">
      <div class="field">
        <label>汇率 USD/CNY</label>
        <div class="input-wrap"><input type="number" id="globalExchangeRate" value="7.20" step="0.01"></div>
      </div>
      <div class="field">
        <label>港杂运费 CNY/吨</label>
        <div class="input-wrap"><input type="number" id="globalFreight" value="0" step="10"></div>
      </div>
      <div class="field">
        <label>增值税率 %</label>
        <div class="input-wrap"><input type="number" id="globalVatRate" value="13" step="0.5"></div>
      </div>
      <div class="field">
        <label>水分基准 %</label>
        <div class="input-wrap"><input type="number" id="globalMoisture" value="30" step="1"></div>
      </div>
    </div>
    <div class="global-ops">
      <button class="btn-reset-all" id="btnResetAll">🔄 重置全部</button>
      <button class="btn-clear-cache" id="btnClearCache">🗑️ 清空缓存</button>
    </div>
  </section>

  <main id="cards-container"></main>

  <footer class="app-footer">
    <div class="version">v8.0 · 6合一整合版</div>
    <div>矿链通 Mineral Chain · 佛山市鑫善源商贸有限公司</div>
  </footer>
</div>

<script src="js/common.js"></script>
<script src="js/base-calc.js"></script>
<script src="js/calc-spodumene.js"></script>
<script src="js/calc-copper.js"></script>
<script src="js/calc-nickel.js"></script>
<script src="js/calc-tantalum.js"></script>
<script src="js/calc-tin.js"></script>
<script src="js/calc-znpb.js"></script>

<script>
(function() {
  'use strict';

  var C = window.MCSCommon;

  function loadGlobalConfig() {
    return C.getStorage('global_config', {
      exchangeRate: 7.20,
      freight: 0,
      vatRate: 13,
      moisture: 30
    });
  }

  function saveGlobalConfig() {
    var cfg = {
      exchangeRate: parseFloat(document.getElementById('globalExchangeRate').value) || 7.20,
      freight: parseFloat(document.getElementById('globalFreight').value) || 0,
      vatRate: parseFloat(document.getElementById('globalVatRate').value) || 13,
      moisture: parseFloat(document.getElementById('globalMoisture').value) || 30
    };
    C.setStorage('global_config', cfg);
    window.globalConfig = cfg;
    return cfg;
  }

  function applyGlobalConfigToInputs() {
    var cfg = window.globalConfig;
    document.getElementById('globalExchangeRate').value = cfg.exchangeRate;
    document.getElementById('globalFreight').value = cfg.freight;
    document.getElementById('globalVatRate').value = cfg.vatRate;
    document.getElementById('globalMoisture').value = cfg.moisture;
  }

  // 初始化全局配置
  window.globalConfig = loadGlobalConfig();
  applyGlobalConfigToInputs();

  // 实例化 6 个计价器
  var calculators = [
    new window.SpodumeneCalc(),
    new window.CopperCalc(),
    new window.NickelCalc(),
    new window.TantalumCalc(),
    new window.TinCalc(),
    new window.ZnpbCalc()
  ];

  // Tab 导航
  document.getElementById('tabNav').addEventListener('click', function(e) {
    if (e.target.tagName === 'BUTTON') {
      var target = e.target.dataset.target;
      var card = document.getElementById('card-' + target);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      document.querySelectorAll('.tab-nav button').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
    }
  });

  // 滚动时同步 Tab 高亮
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var id = entry.target.id.replace('card-', '');
        document.querySelectorAll('.tab-nav button').forEach(function(b) {
          b.classList.toggle('active', b.dataset.target === id);
        });
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  calculators.forEach(function(c) { observer.observe(c.el); });

  // 全局参数变化
  document.querySelectorAll('.global-panel input').forEach(function(input) {
    input.addEventListener('change', function() {
      saveGlobalConfig();
      calculators.forEach(function(c) { c.applyGlobalConfig(window.globalConfig); });
    });
  });

  // 重置全部
  document.getElementById('btnResetAll').addEventListener('click', function() {
    if (!confirm('确定要重置所有计价器吗？')) return;
    calculators.forEach(function(c) { c.resetCard(); });
    C.showToast('全部已重置');
  });

  // 清空缓存
  document.getElementById('btnClearCache').addEventListener('click', function() {
    if (!confirm('确定要清空所有本地缓存数据吗？此操作不可恢复。')) return;
    C.clearAllStorage();
    C.showToast('缓存已清空');
  });

  // 初始保存一次全局配置
  saveGlobalConfig();
})();
</script>

</body>
</html>
